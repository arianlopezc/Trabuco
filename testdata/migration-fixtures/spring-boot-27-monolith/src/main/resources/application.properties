spring.application.name=acme-shop
spring.profiles.active=local

# Database (legacy uses H2 embedded for dev; production has its own profile).
spring.datasource.url=jdbc:h2:mem:shop;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# Hibernate ddl-auto=update — Trabuco datastore specialist surfaces this
# as a SCHEMA_DRIFT_RISK that must be replaced with explicit migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080
logging.level.com.acme=INFO
