name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -v ./cmd/trabuco

      - name: Run Go tests
        run: go test -v ./...

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: trabuco-cli
          path: trabuco
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Integration tests: review-checks.sh rule coverage + Stop-hook adapter
  # contract tests (Claude/Cursor/Codex) + full round-trip scenarios. These
  # exercise the review-automation machinery the main `build` job skips
  # because they're tagged `//go:build integration` and exec generated shell
  # scripts. Run on a single JDK (21) — the scripts themselves are JDK-agnostic.
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (review + hooks)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run integration-tagged tests
        run: go test -tags=integration -v ./internal/generator/...

  test-generated-project:
    name: Test Generated Project
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: trabuco-cli

      - name: Make CLI executable
        run: chmod +x ./trabuco

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate project with all modules
        run: |
          mkdir -p test-output
          cd test-output
          ../trabuco init \
            --name=test-project \
            --group-id=com.test.project \
            --modules=Model,SQLDatastore,Shared,API \
            --database=postgresql

      - name: Display generated structure
        run: |
          echo "Generated project structure:"
          find test-output/test-project -type f -name "*.java" -o -name "*.xml" -o -name "*.yml" | head -30

      - name: Build generated project
        working-directory: test-output/test-project
        run: mvn clean compile -B

      - name: Run generated project tests (skip integration)
        working-directory: test-output/test-project
        run: mvn test -B -DskipITs -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

  test-comprehensive-project:
    name: Test Comprehensive Project (All Modules)
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092

    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: trabuco-cli

      - name: Make CLI executable
        run: chmod +x ./trabuco

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate comprehensive project
        run: |
          mkdir -p test-comprehensive
          cd test-comprehensive
          ../trabuco init \
            --name=full-project \
            --group-id=com.test.fullproject \
            --modules=Model,SQLDatastore,Shared,API,Worker,EventConsumer \
            --database=postgresql \
            --message-broker=kafka

      - name: Display generated structure
        run: |
          echo "Generated project structure:"
          find test-comprehensive/full-project -type f \( -name "*.java" -o -name "pom.xml" \) | head -50

      - name: Build and install all modules
        working-directory: test-comprehensive/full-project
        run: mvn clean install -B -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Run unit tests
        working-directory: test-comprehensive/full-project
        run: mvn test -B -DskipITs
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Verify API module starts
        working-directory: test-comprehensive/full-project/API
        run: |
          timeout 60 mvn spring-boot:run -Dspring-boot.run.profiles=local &
          API_PID=$!
          sleep 30
          curl -sf http://localhost:8080/actuator/health || (kill $API_PID 2>/dev/null; exit 1)
          kill $API_PID 2>/dev/null || true
          echo "API started successfully"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Verify Worker module starts
        working-directory: test-comprehensive/full-project/Worker
        run: |
          timeout 60 mvn spring-boot:run -Dspring-boot.run.profiles=local &
          WORKER_PID=$!
          sleep 30
          curl -sf http://localhost:8082/actuator/health || (kill $WORKER_PID 2>/dev/null; exit 1)
          kill $WORKER_PID 2>/dev/null || true
          echo "Worker started successfully"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          ORG_JOBRUNR_BACKGROUND_JOB_SERVER_ENABLED: "true"
          ORG_JOBRUNR_DASHBOARD_ENABLED: "false"

      - name: Verify EventConsumer module starts
        working-directory: test-comprehensive/full-project/EventConsumer
        run: |
          timeout 60 mvn spring-boot:run -Dspring-boot.run.profiles=local &
          CONSUMER_PID=$!
          sleep 30
          curl -sf http://localhost:8084/actuator/health || (kill $CONSUMER_PID 2>/dev/null; exit 1)
          kill $CONSUMER_PID 2>/dev/null || true
          echo "EventConsumer started successfully"
        env:
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  test-minimal-project:
    name: Test Minimal Project (Model only)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: trabuco-cli

      - name: Make CLI executable
        run: chmod +x ./trabuco

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate minimal project
        run: |
          mkdir -p test-minimal
          cd test-minimal
          ../trabuco init \
            --name=minimal-project \
            --group-id=com.minimal.project \
            --modules=Model \
            --database=none

      - name: Build minimal project
        working-directory: test-minimal/minimal-project
        run: mvn clean compile test -B

  test-ai-agents:
    name: Test AI Agent Files Generation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: trabuco-cli

      - name: Make CLI executable
        run: chmod +x ./trabuco

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate project with all AI agents
        run: |
          mkdir -p test-ai
          cd test-ai
          ../trabuco init \
            --name=ai-project \
            --group-id=com.test.ai \
            --modules=Model,Shared,API,Worker,EventConsumer,SQLDatastore \
            --database=postgresql \
            --message-broker=kafka \
            --ai-agents=claude,cursor,copilot,codex \
            --skip-build

      - name: Verify all AI agent files exist
        working-directory: test-ai/ai-project
        run: |
          ERRORS=0

          # Check agent instruction files
          echo "Checking AI agent instruction files..."
          for file in "CLAUDE.md" ".cursor/rules/project.mdc" ".github/copilot-instructions.md" "AGENTS.md"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists ($(wc -l < "$file") lines)"
            else
              echo "  ✗ $file MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check Codex specific files
          echo ""
          echo "Checking Codex configuration files..."
          for file in ".codex/hooks.json" ".codex/config.toml"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists"
            else
              echo "  ✗ $file MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check AI context directory
          echo ""
          echo "Checking .ai directory structure..."
          for file in ".ai/README.md" ".ai/checkpoint.json"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists"
            else
              echo "  ✗ $file MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check prompts (should exist based on modules selected)
          echo ""
          echo "Checking .ai/prompts directory..."
          for file in ".ai/prompts/add-entity.md" ".ai/prompts/add-endpoint.md" ".ai/prompts/add-job.md" ".ai/prompts/add-event.md"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists"
            else
              echo "  ✗ $file MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "ERROR: $ERRORS files missing"
            exit 1
          fi

          echo ""
          echo "All AI agent files verified successfully"

      - name: Verify AI agent files share core content
        working-directory: test-ai/ai-project
        run: |
          # Each verbose agent file must share core content (AGENTS.md is concise baseline — different checks)
          ERRORS=0
          CORE_PATTERNS=("Module Dependencies" "mvn clean compile" "Constructor injection")

          for file in "CLAUDE.md" ".cursor/rules/project.mdc" ".github/copilot-instructions.md"; do
            for pattern in "${CORE_PATTERNS[@]}"; do
              if ! grep -q "$pattern" "$file"; then
                echo "  ✗ $file missing core content: '$pattern'"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done

          # AGENTS.md is a concise baseline — check for its specific content
          for pattern in "Module Dependency Rules" "mvn clean compile" "Key Patterns"; do
            if ! grep -q "$pattern" "AGENTS.md"; then
              echo "  ✗ AGENTS.md missing baseline content: '$pattern'"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "ERROR: $ERRORS core content checks failed"
            exit 1
          fi

          echo "All AI agent files contain core content ✓"

      - name: Verify Claude Code path-scoped rules
        working-directory: test-ai/ai-project
        run: |
          # Claude rules must have paths: frontmatter for context-efficient loading.
          # Task playbooks (add-entity, add-endpoint, etc.) should NOT be in .claude/rules/.
          ERRORS=0

          # These 3 rules should exist with paths frontmatter
          for file in ".claude/rules/JAVA_CODE_QUALITY.md" ".claude/rules/code-review.md" ".claude/rules/testing-guide.md"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists"
              if grep -q "^paths:" "$file"; then
                echo "    ✓ has paths: frontmatter"
              else
                echo "    ✗ MISSING paths: frontmatter"
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "  ✗ $file MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Task playbooks should NOT be in .claude/rules/
          for file in ".claude/rules/add-entity.md" ".claude/rules/add-endpoint.md" ".claude/rules/add-job.md" ".claude/rules/add-event.md" ".claude/rules/extending-the-project.md"; do
            if [ -f "$file" ]; then
              echo "  ✗ $file should NOT exist in rules (belongs in .ai/prompts/ only)"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "ERROR: $ERRORS Claude rules checks failed"
            exit 1
          fi

          echo "All Claude Code path-scoped rules verified ✓"

      - name: Verify Codex hooks.json uses correct schema
        working-directory: test-ai/ai-project
        run: |
          # Codex hooks must use array format with event/handlers (not Claude's object format)
          if grep -q '"event"' .codex/hooks.json && grep -q '"handlers"' .codex/hooks.json; then
            echo "  ✓ .codex/hooks.json uses correct Codex schema (event/handlers)"
          else
            echo "  ✗ .codex/hooks.json does NOT use correct Codex schema"
            cat .codex/hooks.json
            exit 1
          fi

      - name: Verify Claude skills have required frontmatter
        working-directory: test-ai/ai-project
        run: |
          ERRORS=0
          for skill in ".claude/skills/commit/SKILL.md" ".claude/skills/pr/SKILL.md" ".claude/skills/review/SKILL.md"; do
            if [ -f "$skill" ]; then
              echo "  ✓ $skill exists"
              if grep -q "user-invocable: true" "$skill"; then
                echo "    ✓ has user-invocable: true"
              else
                echo "    ✗ MISSING user-invocable: true"
                ERRORS=$((ERRORS + 1))
              fi
              if grep -q "allowed-tools:" "$skill"; then
                echo "    ✓ has allowed-tools"
              else
                echo "    ✗ MISSING allowed-tools"
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "  ✗ $skill MISSING"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "ERROR: $ERRORS skill frontmatter checks failed"
            exit 1
          fi

          echo "All Claude skills have required frontmatter ✓"

      - name: Verify prompts contain module-specific content
        working-directory: test-ai/ai-project
        run: |
          echo "Checking prompt content..."

          # add-entity should mention Immutables
          if grep -q "Immutables" .ai/prompts/add-entity.md; then
            echo "  ✓ add-entity.md mentions Immutables"
          else
            echo "  ✗ add-entity.md missing Immutables reference"
            exit 1
          fi

          # add-endpoint should mention REST/controller
          if grep -q -i "controller\|endpoint\|REST" .ai/prompts/add-endpoint.md; then
            echo "  ✓ add-endpoint.md mentions controller/endpoint"
          else
            echo "  ✗ add-endpoint.md missing controller reference"
            exit 1
          fi

          # add-job should mention JobRunr
          if grep -q "JobRunr\|JobRequest" .ai/prompts/add-job.md; then
            echo "  ✓ add-job.md mentions JobRunr"
          else
            echo "  ✗ add-job.md missing JobRunr reference"
            exit 1
          fi

          # add-event should mention the message broker (kafka)
          if grep -q -i "kafka\|event\|listener" .ai/prompts/add-event.md; then
            echo "  ✓ add-event.md mentions kafka/event"
          else
            echo "  ✗ add-event.md missing broker reference"
            exit 1
          fi

          echo ""
          echo "All prompts contain expected module-specific content ✓"

  # ─────────────────────────────────────────────────────────────────────────
  # Archetype × JDK matrix: generate representative project shapes on the
  # JDKs users actually run, then execute `mvn clean install` with the full
  # test suite (no -DskipTests). Existing jobs above compile with -DskipTests
  # on Java 21 only, which is why v1.8.1/v1.8.2 shipped with Mockito/Jacoco/
  # banned-deps failures that only surface on Java 24/25 at test time.
  #
  # Scope: 4 archetypes × 3 JDKs = 12 parallel shards. Keep JDKs in sync
  # with `flagJavaVersion` accepted values in internal/cli/init.go.
  # ─────────────────────────────────────────────────────────────────────────
  archetype-matrix:
    name: Archetype ${{ matrix.archetype }} on JDK ${{ matrix.java }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '24', '25']
        archetype:
          - api-minimal
          - crud-sql
          - aiagent-pubsub
          - full-fat
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: trabuco-cli

      - name: Make CLI executable
        run: chmod +x ./trabuco

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Run archetype build + tests
        env:
          TRABUCO_BIN: ${{ github.workspace }}/trabuco
          ARCHETYPE: ${{ matrix.archetype }}
        # bash explicit so CI doesn't depend on the exec bit being preserved
        run: bash scripts/e2e/test_full_build.sh "$ARCHETYPE"
